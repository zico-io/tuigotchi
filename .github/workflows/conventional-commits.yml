name: conventional-commits

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read
  contents: read

jobs:
  pr-title:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
          subjectPattern: ^[^A-Z].+$
          subjectPatternError: |
            The subject `{subject}` in PR title `{title}` should not start with an
            uppercase character (lowercase imperative mood, e.g. "add pet evolution").

  commits:
    name: Validate commit subjects
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check each commit subject
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          pattern='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([^)]+\))?!?: .+$'
          failed=0
          while IFS= read -r line; do
            sha="${line%% *}"
            subject="${line#* }"
            case "$subject" in
              "Merge "*|"Revert "*|"fixup!"*|"squash!"*|"amend!"*) continue ;;
            esac
            if [[ ! "$subject" =~ $pattern ]]; then
              echo "::error::commit $sha subject does not follow Conventional Commits: $subject"
              failed=1
            fi
          done < <(git log --format='%H %s' "$BASE_SHA..$HEAD_SHA")
          if [[ $failed -ne 0 ]]; then
            echo ""
            echo "Allowed types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert"
            echo "See https://www.conventionalcommits.org/"
            exit 1
          fi
